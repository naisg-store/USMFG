<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WoW Midnight (12.0.7) Stat Priorities - Mayteck C.S.</title>
    <meta name="description" content="Quick reference cheat sheet for World of Warcraft: Midnight Season 1 stat priorities and rotations.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface: rgba(30, 41, 59, 0.5);
            --surface-hover: rgba(99, 102, 241, 0.2);
            --border: rgba(255, 255, 255, 0.1);
            --border-hover: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            
            /* WoW Role Colors */
            --role-dps: #ef4444;
            --role-tank: #3b82f6;
            --role-heal: #10b981;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%; 
            max-width: 1200px; /* Widened slightly to accommodate the rotations */
        }

        .header { 
            text-align: center; 
            margin-bottom: 40px; 
            margin-top: 20px; 
        }

        h1 { 
            margin: 0 0 10px 0; 
            font-size: 2.8rem; 
            font-weight: 800; 
            letter-spacing: -1px; 
        }

        p { 
            color: var(--text-muted); 
            margin: 0; 
            font-size: 1.1rem; 
        }

        /* Filter Buttons */
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .filter-btn.active, .filter-btn:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.2);
        }

        /* Grid Layout */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .spec-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .spec-card:hover {
            transform: translateY(-3px);
            border-color: var(--border-hover);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .class-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .role-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 800;
        }

        .role-dps { background: rgba(239, 68, 68, 0.2); color: var(--role-dps); border: 1px solid var(--role-dps); }
        .role-tank { background: rgba(59, 130, 246, 0.2); color: var(--role-tank); border: 1px solid var(--role-tank); }
        .role-heal { background: rgba(16, 185, 129, 0.2); color: var(--role-heal); border: 1px solid var(--role-heal); }

        .stat-priority {
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 600;
            margin: 10px 0;
            line-height: 1.4;
        }
        
        .stat-highlight { color: var(--accent); }

        .spec-notes {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0 0 15px 0;
        }

        /* Rotation Styles */
        .rotation-block {
            margin-top: auto; /* Pushes rotation to the bottom of the card */
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .rotation-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 10px;
        }

        .rotation-sequence {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .spell-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px 4px 4px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .spell-icon {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .sequence-arrow {
            color: var(--accent);
            font-weight: 800;
            font-size: 1.1rem;
        }

    </style>
</head>

        // Fallback function for broken images
        function handleImageError(img) {
            img.onerror = null; // Prevent infinite loop if fallback also fails
            img.src = 'https://wow.zamimg.com/images/wow/icons/small/inv_misc_questionmark.jpg';
        }

        function renderCards(filter) {
            container.innerHTML = '';
            
            wowData.forEach(item => {
                if (filter === 'all' || item.role === filter) {
                    const card = document.createElement('div');
                    card.className = 'spec-card';
                    
                    const roleLabel = item.role.toUpperCase();
                    
                    // Build the rotation HTML dynamically
                    let rotationHTML = '';
                    if (item.rotation && item.rotation.length > 0) {
                        rotationHTML = `
                            <div class="rotation-block">
                                <div class="rotation-title">Core Priority / Opener</div>
                                <div class="rotation-sequence">
                                    ${item.rotation.map((spell, index) => `
                                        <div class="spell-item">
                                            <img src="https://wow.zamimg.com/images/wow/icons/small/${spell.icon}.jpg" 
                                                 alt="${spell.name}" 
                                                 class="spell-icon"
                                                 onerror="handleImageError(this)">
                                            ${spell.name}
                                        </div>
                                        ${index < item.rotation.length - 1 ? '<span class="sequence-arrow">></span>' : ''}
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    card.innerHTML = `
                        <div class="class-title">
                            ${item.class}: ${item.spec}
                            <span class="role-badge role-${item.role}">${roleLabel}</span>
                        </div>
                        <div class="stat-priority">
                            Priority: <span class="stat-highlight">${item.stats}</span>
                        </div>
                        <p class="spec-notes">${item.notes}</p>
                        ${rotationHTML}
                    `;
                    container.appendChild(card);
                }
            });
        }

        window.filterSpecs = function(role) {
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderCards(role);
        }

        // Initial render
        renderCards('all');
